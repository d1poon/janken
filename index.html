<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>じゃんけん！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ヘッダー -->
    <header>
      <h1>✊ じゃんけん！</h1>
      <p id="header-sub">何連勝できるかチャレンジ</p>
    </header>

    <!-- モード切替バー -->
    <div class="mode-bar" id="mode-bar">
      <button class="mode-btn active" data-mode="streak">🏆 連勝モード</button>
      <button class="mode-btn" data-mode="timeattack">⏱ タイムアタック</button>
    </div>

    <!-- PvP招待パネル（PvPモード時のみ表示） -->
    <div class="pvp-invite" id="pvp-invite" style="display:none">
      <div class="pvp-invite-title">👥 友達を招待</div>
      <div class="pvp-invite-sub">このURLを友達に送ってください</div>
      <div class="pvp-url-box" id="pvp-url-box"></div>
      <button class="pvp-copy-btn" id="pvp-copy-btn">📋 URLをコピー</button>
    </div>

    <!-- PvPステータス（PvPモード時のみ表示） -->
    <div class="pvp-status-bar" id="pvp-status-bar" style="display:none">
      <span id="pvp-status-text">友達の参加を待っています…</span>
      <button class="pvp-exit-btn" id="pvp-exit-btn">✕ 退出</button>
    </div>

    <!-- スコアバー -->
    <div class="score-bar">
      <div class="score-item">
        <div class="score-label" id="score-label-left">現在の連勝</div>
        <div class="score-value streak" id="streak">0</div>
      </div>
      <div class="score-item">
        <div class="score-label" id="score-label-right">🏆 自己ベスト</div>
        <div class="score-value" id="best">—</div>
      </div>
    </div>

    <!-- バトルエリア -->
    <div class="battle-area" id="battle-area">
      <div class="confetti-layer" id="confetti-layer"></div>

      <!-- タイムアタック タイマー（TAモード時のみ表示） -->
      <div class="ta-timer" id="ta-timer" style="display:none">
        <span id="ta-time-left">30</span>
        <span class="ta-timer-unit">秒</span>
      </div>

      <div class="cpu-hand-wrap">
        <span class="cpu-label" id="opponent-label">CPU</span>
        <span class="hand-icon idle" id="cpu-hand">✊</span>
      </div>

      <div class="call-text" id="call-text">じゃんけん？</div>
      <div class="result-text" id="result-text"></div>

      <!-- シェアボタン（負け時に表示） -->
      <button class="share-btn" id="share-btn" style="display:none">
        𝕏 連勝記録をシェア
      </button>
    </div>

    <!-- プレイヤー選択 -->
    <div class="player-section">
      <div class="player-label">あなたの手を選んでください</div>

      <!-- 難易度選択（CPUモード時のみ） -->
      <div class="difficulty-bar" id="difficulty-bar">
        <div class="diff-btns">
          <button class="diff-btn" data-diff="easy">やさしい</button>
          <button class="diff-btn active" data-diff="normal">ふつう</button>
          <button class="diff-btn" data-diff="hard">つよい</button>
          <button class="diff-btn" data-diff="insane">🔥 鬼</button>
        </div>
      </div>

      <div class="choice-buttons">
        <button class="choice-btn" data-hand="rock">
          <span class="btn-icon">✊</span>
          <span class="btn-label">グー</span>
        </button>
        <button class="choice-btn" data-hand="scissors">
          <span class="btn-icon">✌️</span>
          <span class="btn-label">チョキ</span>
        </button>
        <button class="choice-btn" data-hand="paper">
          <span class="btn-icon">🖐️</span>
          <span class="btn-label">パー</span>
        </button>
      </div>
    </div>

    <!-- 友達と対戦ボタン（CPUモード時のみ表示） -->
    <button class="pvp-create-btn" id="pvp-create-btn">👥 友達と対戦する</button>

    <!-- ランキング（CPUモード時のみ表示） -->
    <div class="ranking" id="ranking-section">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="tab-local">🏅 自分の記録</button>
        <button class="tab-btn" data-tab="tab-online">🌍 世界ランキング</button>
      </div>
      <div class="tab-panel active" id="tab-local">
        <ul class="rank-list" id="rank-list">
          <li class="rank-empty">まだ記録がありません</li>
        </ul>
      </div>
      <div class="tab-panel" id="tab-online">
        <ul class="rank-list" id="online-rank-list">
          <li class="rank-empty">読み込み中…</li>
        </ul>
      </div>
    </div>

    <!-- 実績・バッジ -->
    <div class="badge-section" id="badge-section">
      <div class="badge-section-header">
        <span class="badge-section-title">🏅 実績</span>
        <span class="badge-count" id="badge-count">0/8</span>
      </div>
      <div class="badge-grid" id="badge-grid"></div>
    </div>

  </div>

  <!-- NEW RECORD バナー -->
  <div class="new-record-banner" id="new-record-banner"></div>

  <script src="script.js"></script>
</body>
</html>
